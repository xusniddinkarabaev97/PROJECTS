<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GZS Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0a0e14;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
        .card{background:#161c24;border:1px solid #252d3a;border-radius:16px;padding:20px;width:100%;max-width:400px}
        .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:center}
        .btn-teal{background:linear-gradient(135deg,#14b8a6,#10b981);color:#0f172a}
        .btn-green{background:#10b981;color:#fff}
        .btn-gray{background:#1e293b;color:#94a3b8}
        .btn-red{background:rgba(244,63,94,0.2);color:#f43f5e}
        .input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#fff;font-size:14px;margin-bottom:8px;outline:none}
        .input:focus{border-color:#14b8a6}
        .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e293b;font-size:14px}
        .val{font-weight:600;color:#fff;font-family:monospace}
        .val-green{color:#10b981;font-size:20px;font-weight:700}
        .hidden{display:none!important}
        .spinner{width:20px;height:20px;border:2px solid #334155;border-top-color:#14b8a6;border-radius:50%;animation:spin .6s linear infinite;margin:16px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .err{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.2);color:#f43f5e;border-radius:12px;padding:12px;font-size:13px;margin-bottom:8px}
        .ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#10b981;border-radius:12px;padding:12px;font-size:13px;margin-bottom:8px}
    </style>
</head>
<body>

<div style="text-align:center;margin:20px 0">
    <div style="width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,#14b8a6,#10b981);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0f172a">GZS</div>
    <h1 style="font-size:20px;font-weight:700">GZS Scanner</h1>
    <p style="font-size:12px;color:#94a3b8;margin-top:4px">QR kod rasm orqali yoki ID kiriting</p>
</div>

<div class="card" style="margin-bottom:8px">
    <label class="btn btn-teal" style="cursor:pointer;margin-bottom:0">
        📸 QR kod rasmini olish
        <input type="file" accept="image/*" capture="environment" onchange="handleFile(this)" style="display:none">
    </label>
</div>

<div class="card" style="margin-bottom:8px">
    <input id="manualInput" class="input" placeholder="1283,1 yoki station=1283&dispenser=1">
    <button class="btn btn-teal" onclick="scanManual()">🔍 Izlash</button>
</div>

<div id="loading" class="hidden"><div class="spinner"></div><p style="text-align:center;color:#94a3b8;font-size:13px">Yuklanmoqda...</p></div>

<div id="result" class="hidden card">
    <h3 style="font-size:16px;margin-bottom:12px;color:#10b981">✓ Ma'lumot</h3>
    <div class="row"><span>Stansiya</span><span class="val" id="rS">-</span></div>
    <div class="row"><span>Kolonna</span><span class="val" id="rD">-</span></div>
    <div class="row"><span>Operatsiya</span><span class="val" id="rO">-</span></div>
    <div class="row"><span>Summa</span><span class="val-green" id="rA">-</span></div>
    <div class="row"><span>Hajm</span><span class="val" id="rV">-</span></div>
    <div class="row"><span>Avto</span><span class="val" id="rC">-</span></div>
    <div class="row"><span>Vaqt</span><span class="val" style="font-size:12px" id="rT">-</span></div>
    <button id="btnPay" class="btn btn-teal" onclick="initiatePayment()" style="margin-top:12px">💳 To'lash (bazaga yozish)</button>
    <button class="btn btn-gray" onclick="resetAll()" style="margin-top:8px">Orqaga</button>
</div>

<div id="error" class="hidden err"></div>
<div id="msg" class="hidden ok"></div>

<script>
    let currentData = null;

    function handleFile(input) {
        if (!input.files || !input.files[0]) return;
        document.getElementById('msg').textContent = 'Rasm yuklandi, tekshirilmoqda...';
        document.getElementById('msg').classList.remove('hidden');
        const img = new Image();
        img.onload = function() {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img, 0, 0);
            const d = c.getContext('2d').getImageData(0, 0, c.width, c.height);
            const code = jsQR(d.data, c.width, c.height);
            if (code) {
                document.getElementById('msg').textContent = '✓ QR topildi';
                const re = /station[=:](\d+).*dispenser[=:](\d+)/i;
                const m = code.data.match(re);
                if (m) { fetchData(parseInt(m[1]), parseInt(m[2])); return; }
                const nums = code.data.match(/\d+/g);
                if (nums && nums.length >= 2) { fetchData(parseInt(nums[0]), parseInt(nums[1])); return; }
                alert('QR format: ' + code.data);
            } else {
                alert('QR kod topilmadi');
            }
        };
        img.src = URL.createObjectURL(input.files[0]);
    }

    function scanManual() {
        const v = document.getElementById('manualInput').value.trim();
        const m = v.match(/station[=:](\d+).*dispenser[=:](\d+)/i);
        if (m) { fetchData(parseInt(m[1]), parseInt(m[2])); return; }
        const p = v.split(/[,\s]+/);
        if (p.length >= 2) { fetchData(parseInt(p[0]), parseInt(p[1])); return; }
        alert('Format: 1283,1');
    }

    async function fetchData(sid, did) {
        hideAll();
        document.getElementById('loading').classList.remove('hidden');
        try {
            const r = await fetch('/api/v1/scanner/ugaz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stationId: sid, dispenserId: did })
            });
            if (!r.ok) { const e = await r.json(); throw new Error(e.message || e.title); }
            const d = await r.json();
            currentData = d;
            document.getElementById('rS').textContent = d.filling_station_id;
            document.getElementById('rD').textContent = d.dispenser_id;
            document.getElementById('rO').textContent = d.operation_id;
            document.getElementById('rA').textContent = (d.amount||0).toLocaleString() + ' UZS';
            document.getElementById('rV').textContent = (d.volume||0) + ' L';
            document.getElementById('rC').textContent = d.car_number || '-';
            document.getElementById('rT').textContent = d.created_at ? new Date(d.created_at).toLocaleString() : '-';
            document.getElementById('btnPay').className = 'btn btn-teal';
            document.getElementById('btnPay').textContent = '💳 To\'lash (bazaga yozish)';
            document.getElementById('btnPay').disabled = false;
            document.getElementById('result').classList.remove('hidden');
        } catch(e) {
            document.getElementById('error').textContent = 'Xatolik: ' + e.message;
            document.getElementById('error').classList.remove('hidden');
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    }

    async function initiatePayment() {
        if (!currentData) return;
        const btn = document.getElementById('btnPay');
        btn.disabled = true;
        btn.textContent = '⏳ Yuborilmoqda...';
        try {
            const r = await fetch('/api/v1/payments/initiate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filling_station_id: currentData.filling_station_id,
                    dispenser_id: currentData.dispenser_id
                })
            });
            const d = await r.json();
            if (r.ok) {
                btn.className = 'btn btn-green';
                btn.textContent = '✅ Bazaga yozildi! #' + (d.transaction_id || d.id || 'OK');
                btn.disabled = true;
            } else {
                throw new Error(d.message || d.error || 'Xatolik ' + r.status);
            }
        } catch(e) {
            btn.className = 'btn btn-red';
            btn.textContent = '❌ ' + e.message;
        }
    }

    function resetAll() { hideAll(); }
    function hideAll() {
        document.getElementById('result').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('msg').classList.add('hidden');
    }
</script>
</body>
</html>
