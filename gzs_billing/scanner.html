<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GZS Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#000;color:#e6edf3;height:100vh;overflow:hidden}
        #camSection{position:relative;width:100%;height:100vh;display:flex;flex-direction:column}
        #video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
        #overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
        #frame{width:250px;height:250px;border:3px solid #14b8a6;border-radius:20px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5)}
        #topBar{position:absolute;top:0;left:0;right:0;z-index:10;padding:16px;display:flex;justify-content:space-between;align-items:flex-start}
        #closeBtn{background:rgba(0,0,0,0.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer;z-index:20}
        #status{position:absolute;bottom:80px;left:0;right:0;text-align:center;z-index:10;color:#fff;font-size:16px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        #startBtn{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;background:linear-gradient(135deg,#14b8a6,#10b981);color:#0f172a;border:none;padding:16px 48px;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer}
        /* Result Panel */
        #result{display:none;position:absolute;bottom:0;left:0;right:0;z-index:30;background:#161c24;border-radius:20px 20px 0 0;padding:24px;max-height:70vh;overflow-y:auto}
        #result.show{display:block}
        .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e293b;font-size:14px}
        .vl{font-weight:600;color:#fff;font-family:monospace}
        .vl-green{color:#10b981;font-size:22px;font-weight:700}
        .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;text-align:center}
        .btn-teal{background:linear-gradient(135deg,#14b8a6,#10b981);color:#0f172a}
        .btn-green{background:#10b981;color:#fff}
        .btn-gray{background:#1e293b;color:#94a3b8}
        .btn-red{background:rgba(244,63,94,0.2);color:#f43f5e}
        .err{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.2);color:#f43f5e;border-radius:12px;padding:12px;font-size:13px;margin-top:8px}
        .spinner{display:inline-block;width:16px;height:16px;border:2px solid #0f172a;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="camSection">
    <video id="video" autoplay playsinline></video>
    <div id="overlay"><div id="frame"></div></div>
    <div id="topBar">
        <button id="closeBtn" onclick="stopCamera()">✕</button>
    </div>
    <div id="status">Kamerani yoqish uchun pastdagi tugmani bosing</div>
    <button id="startBtn" onclick="startCamera()">📷 Boshlash</button>

    <!-- Result panel -->
    <div id="result">
        <h3 style="font-size:16px;margin-bottom:12px;color:#10b981">✓ Ma'lumot</h3>
        <div class="row"><span>Stansiya</span><span class="vl" id="rS">-</span></div>
        <div class="row"><span>Kolonna</span><span class="vl" id="rD">-</span></div>
        <div class="row"><span>Operatsiya</span><span class="vl" id="rO">-</span></div>
        <div class="row"><span>Summa</span><span class="vl-green" id="rA">-</span></div>
        <div class="row"><span>Hajm</span><span class="vl" id="rV">-</span></div>
        <div class="row"><span>Avto</span><span class="vl" id="rC">-</span></div>
        <div class="row"><span>Vaqt</span><span class="vl" style="font-size:12px" id="rT">-</span></div>
        <button id="btnPay" class="btn btn-teal" onclick="initiatePayment()">💳 To'lash (bazaga yozish)</button>
        <button class="btn btn-gray" onclick="resetScan()">↩ Orqaga</button>
        <div id="error" class="err" style="display:none"></div>
    </div>
</div>

<script>
    let stream = null, scanning = false, currentData = null;
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            video.play();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').textContent = 'QR kodni ramkaga joylashtiring';
            scanning = true;
            scanLoop();
        } catch(e) {
            // Fallback: file picker
            document.getElementById('status').textContent = 'Kamera yoq. Rasm orqali skanerlang.';
            document.getElementById('startBtn').textContent = '📸 Rasm tanlash';
            document.getElementById('startBtn').onclick = function() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*';
                inp.capture = 'environment';
                inp.onchange = function() { if(inp.files[0]) handleFile(inp.files[0]); };
                inp.click();
            };
        }
    }

    function stopCamera() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        scanning = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('status').textContent = 'Kamerani yoqish uchun pastdagi tugmani bosing';
    }

    function scanLoop() {
        if (!scanning || !stream) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA && typeof jsQR !== 'undefined') {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(img.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
            if (code) {
                scanning = false;
                parseQR(code.data);
                return;
            }
        }
        requestAnimationFrame(scanLoop);
    }

    function handleFile(file) {
        const img = new Image();
        img.onload = function() {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(d.data, canvas.width, canvas.height);
            if (code) { parseQR(code.data); }
            else { alert('QR kod topilmadi'); }
        };
        img.src = URL.createObjectURL(file);
    }

    function parseQR(text) {
        const re = /station[=:](\d+).*dispenser[=:](\d+)/i;
        const m = text.match(re);
        if (m) { fetchData(parseInt(m[1]), parseInt(m[2])); return; }
        const nums = text.match(/\d+/g);
        if (nums && nums.length >= 2) { fetchData(parseInt(nums[0]), parseInt(nums[1])); return; }
        alert('QR kod noto\'g\'ri: ' + text);
        scanning = true;
        scanLoop();
    }

    async function fetchData(sid, did) {
        document.getElementById('status').textContent = 'Yuklanmoqda...';
        try {
            const r = await fetch('/api/v1/scanner/ugaz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stationId: sid, dispenserId: did })
            });
            if (!r.ok) { const e = await r.json(); throw new Error(e.message || e.title); }
            const d = await r.json();
            currentData = d;
            document.getElementById('rS').textContent = d.filling_station_id;
            document.getElementById('rD').textContent = d.dispenser_id;
            document.getElementById('rO').textContent = d.operation_id;
            document.getElementById('rA').textContent = (d.amount||0).toLocaleString() + ' UZS';
            document.getElementById('rV').textContent = (d.volume||0) + ' L';
            document.getElementById('rC').textContent = d.car_number || '-';
            document.getElementById('rT').textContent = d.created_at ? new Date(d.created_at).toLocaleString() : '-';
            document.getElementById('btnPay').className = 'btn btn-teal';
            document.getElementById('btnPay').textContent = '💳 To\'lash (bazaga yozish)';
            document.getElementById('btnPay').disabled = false;
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').classList.add('show');
            document.getElementById('status').textContent = '';
        } catch(e) {
            document.getElementById('error').textContent = 'Xatolik: ' + e.message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('result').classList.add('show');
        }
    }

    async function initiatePayment() {
        if (!currentData) return;
        const btn = document.getElementById('btnPay');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Yuborilmoqda...';
        try {
            const r = await fetch('/api/v1/payments/initiate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filling_station_id: currentData.filling_station_id,
                    dispenser_id: currentData.dispenser_id
                })
            });
            const d = await r.json();
            if (r.ok) {
                btn.className = 'btn btn-green';
                btn.textContent = '✅ Bazaga yozildi! #' + (d.transaction_id || d.id || 'OK');
                btn.disabled = true;
            } else {
                throw new Error(d.message || d.error);
            }
        } catch(e) {
            btn.className = 'btn btn-red';
            btn.textContent = '❌ ' + e.message;
        }
    }

    function resetScan() {
        document.getElementById('result').classList.remove('show');
        document.getElementById('error').style.display = 'none';
        currentData = null;
        scanning = true;
        scanLoop();
        document.getElementById('status').textContent = 'QR kodni ramkaga joylashtiring';
    }
</script>
</body>
</html>
