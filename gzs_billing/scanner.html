<!DOCTYPE html><html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>GZS Scanner</title><script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#000;color:#e6edf3;height:100vh;overflow:hidden}#camSection{position:relative;width:100%;height:100vh}#video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}#frame{width:250px;height:250px;border:3px solid #14b8a6;border-radius:20px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}#topBar{position:absolute;top:0;left:0;right:0;z-index:10;padding:16px;display:flex;justify-content:space-between}#closeBtn{background:rgba(0,0,0,.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer}#status{position:absolute;bottom:100px;left:0;right:0;text-align:center;z-index:10;color:#fff;font-size:16px;text-shadow:0 0 10px rgba(0,0,0,.8)}#startBtn{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;background:linear-gradient(135deg,#14b8a6,#10b981);color:#0f172a;border:none;padding:16px 48px;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer}#result{display:none;position:absolute;bottom:0;left:0;right:0;z-index:30;background:#161c24;border-radius:20px 20px 0 0;padding:24px;max-height:70vh;overflow-y:auto}#result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e293b;font-size:14px}.vl{font-weight:600;color:#fff;font-family:monospace}.vl-green{color:#10b981;font-size:22px;font-weight:700}.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;text-align:center}.btn-teal{background:linear-gradient(135deg,#14b8a6,#10b981);color:#0f172a}.btn-gray{background:#1e293b;color:#94a3b8}.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:#f43f5e;border-radius:12px;padding:12px;font-size:13px;margin-top:8px}.spinner{display:inline-block;width:16px;height:16px;border:2px solid #0f172a;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div id="camSection"><video id="video" autoplay playsinline></video><div id="overlay"><div id="frame"></div></div><div id="topBar"><button id="closeBtn" onclick="stopCamera()">✕</button></div><div id="status">Kamerani yoqish uchun pastdagi tugmani bosing</div><button id="startBtn" onclick="startCamera()">📷 Boshlash</button><div id="result"><h3 style="font-size:16px;margin-bottom:12px;color:#10b981">✓ Ma'lumot</h3><div class="row"><span>Stansiya</span><span class="vl" id="rS">-</span></div><div class="row"><span>Kolonna</span><span class="vl" id="rD">-</span></div><div class="row"><span>Operatsiya</span><span class="vl" id="rO">-</span></div><div class="row"><span>Summa</span><span class="vl-green" id="rA">-</span></div><div class="row"><span>Hajm</span><span class="vl" id="rV">-</span></div><div class="row"><span>Avto</span><span class="vl" id="rC">-</span></div><div class="row"><span>Vaqt</span><span class="vl" style="font-size:12px" id="rT">-</span></div><button id="btnPay" class="btn btn-teal" onclick="initiatePayment()">💳 To'lash</button><button class="btn btn-gray" onclick="resetScan()">↩ Orqaga</button><div id="error" class="err" style="display:none"></div></div></div><script>let stream=null,scanning=false,currentData=null;const video=document.getElementById('video'),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});video.srcObject=stream;video.play();document.getElementById('startBtn').style.display='none';document.getElementById('status').textContent='QR kodni ramkaga joylashtiring';scanning=true;scanLoop()}catch(e){document.getElementById('status').textContent='Rasm orqali skanerlang';document.getElementById('startBtn').textContent='📸 Rasm tanlash';document.getElementById('startBtn').onclick=function(){var i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';i.onchange=function(){if(i.files[0])handleFile(i.files[0])};i.click()}}}function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}scanning=false;document.getElementById('startBtn').style.display='block';document.getElementById('status').textContent='Kamerani yoqish uchun pastdagi tugmani bosing'}function scanLoop(){if(!scanning||!stream)return;if(video.readyState===video.HAVE_ENOUGH_DATA&&typeof jsQR!=='undefined'){canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);var d=ctx.getImageData(0,0,canvas.width,canvas.height),code=jsQR(d.data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});if(code){scanning=false;parseQR(code.data);return}}requestAnimationFrame(scanLoop)}function handleFile(file){var img=new Image();img.onload=function(){canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);var d=ctx.getImageData(0,0,canvas.width,canvas.height),code=jsQR(d.data,canvas.width,canvas.height);if(code)parseQR(code.data);else alert('QR kod topilmadi')};img.src=URL.createObjectURL(file)}function parseQR(t){var m=t.match(/station[=:](\d+).*dispenser[=:](\d+)/i);if(m){fetchData(parseInt(m[1]),parseInt(m[2]));return}var n=t.match(/\d+/g);if(n&&n.length>=2){fetchData(parseInt(n[0]),parseInt(n[1]));return}alert('QR kod noto\'g\'ri: '+t);scanning=true;scanLoop()}async function fetchData(sid,did){document.getElementById('status').textContent='Yuklanmoqda...';var el=document.getElementById('error');el.style.display='none';try{var r=await fetch('/api/v1/scanner/ugaz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stationId:sid,dispenserId:did})});if(!r.ok){var e=await r.json();throw new Error(e.message||e.title||'Error '+r.status)}var d=await r.json();currentData=d;document.getElementById('rS').textContent=d.filling_station_id;document.getElementById('rD').textContent=d.dispenser_id;document.getElementById('rO').textContent=d.operation_id;document.getElementById('rA').textContent=(d.amount||0).toLocaleString()+' UZS';document.getElementById('rV').textContent=(d.volume||0)+' L';document.getElementById('rC').textContent=d.car_number||'-';document.getElementById('rT').textContent=d.created_at?new Date(d.created_at).toLocaleString():'-';document.getElementById('btnPay').className='btn btn-teal';document.getElementById('btnPay').textContent='💳 To\'lash';document.getElementById('btnPay').disabled=false;document.getElementById('result').classList.add('show');document.getElementById('status').textContent=''}catch(e){el.textContent='Xatolik: '+e.message;el.style.display='block';document.getElementById('result').classList.add('show')}}async function initiatePayment(){if(!currentData)return;var btn=document.getElementById('btnPay');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Yuborilmoqda...';try{var r=await fetch('/api/v1/payments/initiate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filling_station_id:currentData.filling_station_id,dispenser_id:currentData.dispenser_id})});var d=await r.json();if(r.ok){var res=document.getElementById('result');res.innerHTML='<div style="text-align:center;padding:20px 0"><div style="font-size:64px;margin-bottom:12px">✅</div><h2 style="font-size:22px;color:#10b981;margin-bottom:8px">To\'landi!</h2><p style="color:#94a3b8;font-size:14px;margin-bottom:4px">Tranzaksiya #'+(d.transaction_id||d.id||'OK')+'</p><p style="font-size:28px;font-weight:700;color:#fff;margin:12px 0">'+(currentData.amount||0).toLocaleString()+' UZS</p><p style="color:#64748b;font-size:13px">'+(currentData.car_number||'')+'</p><button class="btn btn-teal" onclick="resetScan()" style="margin-top:20px">Yangi skanerlash</button></div>'}else throw new Error(d.message||d.error)}catch(e){btn.textContent='❌ '+e.message;btn.disabled=false}}function resetScan(){document.getElementById('result').classList.remove('show');document.getElementById('error').style.display='none';currentData=null;scanning=true;scanLoop();document.getElementById('status').textContent='QR kodni ramkaga joylashtiring'}</script></body></html>
