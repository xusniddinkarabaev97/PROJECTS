<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Раскрытие информации — Whirl AJ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{background:#0b1024;color:white;font-family:Inter;padding:100px;transition:background .35s,color .35s;}
[data-theme="light"] body{background:#f5f5f7;color:#1d1d1f;}
[data-theme="light"] .card{background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1);}
.card{
  background:rgba(255,255,255,0.05);
  padding:60px;
  border-radius:30px;
  max-width:900px;
}

    /* =========================================
       LIGHT MODE — data-theme="light" on <html>
       ========================================= */
    [data-theme="light"]{
      --bg:#f5f5f7;
      --sf:rgba(0,0,0,.04);
      --sf2:rgba(0,0,0,.08);
      --bd:rgba(0,0,0,.1);
      --bd2:rgba(0,0,0,.22);
      --t:#1d1d1f;
      --t2:rgba(29,29,31,.56);
      --t3:rgba(29,29,31,.32);
      --ac:#0071e3;
      --acd:rgba(0,113,227,.1);
    }
    /* Header & nav overrides */
    [data-theme="light"] header{background:rgba(245,245,247,.82)!important;}
    [data-theme="light"] header.scrolled{background:rgba(245,245,247,.96)!important;}
    [data-theme="light"] .mob-nav{background:rgba(245,245,247,.95)!important;}
    [data-theme="light"] #intro{background:#f5f5f7!important;}
    [data-theme="light"] .lang-pill button.active{background:rgba(0,0,0,.12);color:var(--t);}
    [data-theme="light"] .cur-ring{border-color:rgba(0,0,0,.18);}
    [data-theme="light"] .cur-dot{background:#1d1d1f;}
    [data-theme="light"] .btn-w{background:#1d1d1f;color:#f5f5f7;}
    [data-theme="light"] .btn-w:hover{background:#333;}
    [data-theme="light"] .hero-grad{
      background:linear-gradient(120deg,#003399 0%,#0055cc 35%,#7700cc 65%,#cc0066 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;
    }
    [data-theme="light"] .metrics-wrap,[data-theme="light"] .info-grid{background:var(--bd);}
    [data-theme="light"] .met,[data-theme="light"] .info-cell{background:var(--bg);}
    [data-theme="light"] .met:hover,[data-theme="light"] .info-cell:hover{background:var(--sf);}
    /* Smooth transitions for theme switch */
    body,header,.mob-nav,#intro,.pcard,.doc-row,.info-cell,.met,.ct-wrap,
    .lang-pill,.doc-ico,.info-pill,.lbl,.ticker-item,.ft-logo,.ft-copy,.ft-links a{
      transition:background .35s ease,color .35s ease,border-color .35s ease,box-shadow .35s ease!important;
    }
    /* ── Theme Toggle Button ── */
    .theme-toggle{
      position:relative;display:inline-flex;align-items:center;justify-content:center;
      width:34px;height:34px;border-radius:50%;
      background:var(--sf);border:1px solid var(--bd);
      cursor:pointer;margin-left:8px;flex-shrink:0;
      transition:background .25s,border-color .25s,transform .25s;
      overflow:hidden;
    }
    .theme-toggle:hover{background:var(--sf2);border-color:var(--bd2);transform:scale(1.08);}
    .theme-toggle .t-icon{
      position:absolute;width:15px;height:15px;
      color:var(--t2);transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .3s;
    }
    .t-moon{opacity:1;transform:rotate(0deg) scale(1);}
    .t-sun{opacity:0;transform:rotate(90deg) scale(.4);}
    [data-theme="light"] .t-moon{opacity:0;transform:rotate(-90deg) scale(.4);}
    [data-theme="light"] .t-sun{opacity:1;transform:rotate(0deg) scale(1);}
    [data-theme="light"] .theme-toggle:hover{background:var(--sf2);}

  </style>
</head>
<body>

<button id="themeToggle" style="position:fixed;top:16px;right:20px;z-index:999;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;color:rgba(255,255,255,.7);" title="Toggle theme">
  <svg id="t-moon" style="position:absolute;width:15px;height:15px;transition:transform .4s,opacity .3s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg id="t-sun" style="position:absolute;width:15px;height:15px;opacity:0;transform:rotate(90deg) scale(.4);transition:transform .4s,opacity .3s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>
<style>
  [data-theme="light"] #themeToggle{background:rgba(0,0,0,.07)!important;border-color:rgba(0,0,0,.15)!important;color:#1d1d1f!important;}
  [data-theme="light"] #t-moon{opacity:0!important;transform:rotate(-90deg) scale(.4)!important;}
  [data-theme="light"] #t-sun{opacity:1!important;transform:none!important;}
</style>
<div class="card">
  <h1>Существенный факт №43</h1>
  <p>
    16.07.2025 г. Barabanova Angelina Sergeyevna стала владельцем 50% акций
    (510 125 225 шт.), 5 101 252,25 тыс. сум.<br><br>
    Дата уведомления: 28.07.2025.
  </p>
</div>

  <script>
  /* ── Theme toggle (persisted) ── */
  (function(){
    var root=document.documentElement;
    var stored=localStorage.getItem('whirl-theme');
    var prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    var initial=stored||(prefersDark?'dark':'light');
    if(initial==='light') root.setAttribute('data-theme','light');
    function applyCanvas(){
      var canvas=document.getElementById('bgc');
      if(!canvas) return;
      /* canvas bg will auto-pick next frame via draw loop */
      canvas._lightMode=(root.getAttribute('data-theme')==='light');
    }
    applyCanvas();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(!btn) return;
      btn.addEventListener('click',function(){
        var isLight=root.getAttribute('data-theme')==='light';
        if(isLight){
          root.removeAttribute('data-theme');
          localStorage.setItem('whirl-theme','dark');
        } else {
          root.setAttribute('data-theme','light');
          localStorage.setItem('whirl-theme','light');
        }
        applyCanvas();
        /* update canvas bg color reference */
        if(window._canvasBg!==undefined){
          window._canvasBg=root.getAttribute('data-theme')==='light'?'#f5f5f7':'#03030a';
        }
      });
    });
  })();
  </script>

</body>
</html>
