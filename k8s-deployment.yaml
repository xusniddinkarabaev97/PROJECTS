apiVersion: apps/v1
kind: Deployment
metadata:
  name: whirl-site
  labels:
    app: whirl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whirl
  template:
    metadata:
      labels:
        app: whirl
    spec:
      containers:
        - name: nginx
          image: swr.ru-moscow-1.myhuaweicloud.com/whirl/whirl-site:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: whirl-site
  labels:
    app: whirl
spec:
  type: LoadBalancer
  selector:
    app: whirl
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
