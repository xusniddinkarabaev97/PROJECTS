# ASSETO — Nginx + SSL reverse-proxy config
# Place at: /etc/nginx/sites-available/asseto
# Enable:   sudo ln -s /etc/nginx/sites-available/asseto /etc/nginx/sites-enabled/
# Cert:     sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Limits ---
    client_max_body_size 20M;

    # --- Security headers (Nginx layer, no duplicates with Flask) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Static files served directly (bypass Flask) ---
    location /static/ {
        alias /path/to/asseto/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Gunicorn reverse proxy ---
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Health check (no access log noise) ---
    location = /api/health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }
}
