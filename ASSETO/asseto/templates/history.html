<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSETO — История изменений</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#4361EE;--green:#34c759;--amber:#ff9f0a;--red:#ff3b30;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--sans:'Inter',system-ui,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;--accent:#6c7ff5;}}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);}
[data-theme="dark"]{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;--accent:#6c7ff5;}
[data-theme="light"]{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#4361EE;}
.nav{position:sticky;top:0;z-index:100;height:56px;background:rgba(242,242,247,.88);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
@media(prefers-color-scheme:dark){.nav{background:rgba(0,0,0,.8);}}
[data-theme="dark"] .nav{background:rgba(0,0,0,.8);}
[data-theme="light"] .nav{background:rgba(242,242,247,.88);}
.nav-left{display:flex;align-items:center;gap:14px;}
.back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:5px;}
.nav-title{font-size:16px;font-weight:600;color:var(--text);}
.content{max-width:1000px;margin:0 auto;padding:24px 20px;}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 16px;border-radius:980px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{background:var(--surface);color:var(--text2);border:.5px solid var(--border2);box-shadow:var(--shadow);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .15s;width:260px;}
.search:focus{border-color:var(--accent);}
select.filter{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:.5px solid var(--border);}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:11px 16px;font-size:13px;vertical-align:middle;}
.inv-tag{font-family:ui-monospace,monospace;font-size:11px;font-weight:600;color:var(--accent);background:rgba(67,97,238,.1);padding:3px 8px;border-radius:6px;}
.action-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:980px;}
.act-add{background:rgba(52,199,89,.1);color:#34c759;}
.act-edit{background:rgba(255,159,10,.1);color:#ff9f0a;}
.act-del{background:rgba(255,59,48,.1);color:#ff3b30;}
.act-other{background:var(--surface3);color:var(--text2);}
.ts{color:var(--text3);font-size:12px;}
.diff{font-size:12px;color:var(--text2);}
.diff b{color:var(--text);}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.page-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.page-btn:hover,.page-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.empty{text-align:center;padding:48px;color:var(--text2);}
.theme-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px;}
.theme-btn:hover{background:var(--surface2);}
</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ASSETO">
</head>
<body>
<nav class="nav">
  <div class="nav-left">
    <a href="/dashboard" class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg> Главная</a>
    <span class="nav-title">История изменений</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    {% if user.role in ['superadmin','aho','auditor'] %}
    <a href="/api/history/export" class="btn btn-ghost btn-sm" style="text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Excel
    </a>
    {% endif %}
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
  </div>
</nav>

<div class="content">
  <div class="toolbar">
    <input class="search" type="text" placeholder="Поиск по инв.№, модели, пользователю…" oninput="filterRows()" id="q">
    <select class="filter" id="actFilter" onchange="filterRows()">
      <option value="">Все действия</option>
      <option value="Добавлен">Добавлен</option>
      <option value="Изменено">Изменение</option>
      <option value="Импорт">Импорт</option>
      <option value="Выдано">Выдано</option>
      <option value="Возвращено">Возвращено</option>
      <option value="Удалён">Удалён</option>
    </select>
    <span id="count-label" style="font-size:13px;color:var(--text2);margin-left:auto;"></span>
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th>Инв.№</th><th>Категория</th><th>Действие</th><th>Поле</th><th>Было → Стало</th><th>Кто</th><th>Когда</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" style="display:none">Нет записей</div>
  </div>
  <div class="pagination" id="pager"></div>
</div>

<script>
const ALL = {{ rows|tojson }};
let filtered = [...ALL];
const PER = 30;
let page = 0;

function actionClass(a){
  if(a.includes('Добавлен')||a.includes('Импорт')) return 'act-add';
  if(a.includes('Изменено')||a.includes('Фото')) return 'act-edit';
  if(a.includes('Удал')) return 'act-del';
  return 'act-other';
}

function fmt(ts){
  if(!ts) return '—';
  const d = new Date(ts.replace(' ','T')+'Z');
  return d.toLocaleString('ru',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function filterRows(){
  const q = document.getElementById('q').value.toLowerCase();
  const act = document.getElementById('actFilter').value.toLowerCase();
  filtered = ALL.filter(r=>{
    const txt = [r.inv_num,r.category,r.model,r.user_name,r.action,r.old_val,r.new_val].join(' ').toLowerCase();
    return txt.includes(q) && (!act || r.action.toLowerCase().includes(act));
  });
  page = 0;
  render();
}

function render(){
  const start = page * PER;
  const slice = filtered.slice(start, start + PER);
  document.getElementById('count-label').textContent = `${filtered.length} записей`;
  const tbody = document.getElementById('tbody');
  if(!filtered.length){tbody.innerHTML='';document.getElementById('empty').style.display='block';return;}
  document.getElementById('empty').style.display='none';
  tbody.innerHTML = slice.map(r=>`
    <tr>
      <td><a href="/asset/${r.inv_num||''}" style="text-decoration:none;"><span class="inv-tag">${r.inv_num||'—'}</span></a></td>
      <td style="color:var(--text2);font-size:12px;">${r.category||'—'}</td>
      <td><span class="action-badge ${actionClass(r.action)}">${r.action}</span></td>
      <td style="color:var(--text2);font-size:12px;">${r.field||'—'}</td>
      <td class="diff">${r.old_val||r.new_val ? `<b>${r.old_val||'∅'}</b> → <b>${r.new_val||'∅'}</b>` : '—'}</td>
      <td style="font-size:12px;">${r.user_name||'—'}</td>
      <td class="ts">${fmt(r.ts)}</td>
    </tr>`).join('');
  renderPager();
}

function renderPager(){
  const pages = Math.ceil(filtered.length/PER);
  if(pages<=1){document.getElementById('pager').innerHTML='';return;}
  let html='';
  for(let i=0;i<pages;i++) html+=`<button class="page-btn${i===page?' on':''}" onclick="goPage(${i})">${i+1}</button>`;
  document.getElementById('pager').innerHTML=html;
}

function goPage(n){page=n;render();window.scrollTo(0,0);}

// Theme
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme')||'';
  const next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent = next==='dark'?'☀️':'🌙';
  localStorage.setItem('asseto-theme',next);
}
(function(){
  const t=localStorage.getItem('asseto-theme');
  if(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';}
})();

render();
</script>
</body>
</html>
