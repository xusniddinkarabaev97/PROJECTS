<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSETO — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ASSETO">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#4F46E5;--accent2:#7C3AED;
  --text:#1D1D1F;--text2:#6B7280;--text3:#9CA3AF;
  --bg:#F5F5F7;--surface:#fff;--border:rgba(0,0,0,0.08);
  --red:#EF4444;--green:#34C759;
  --sans:'Inter',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--surface:#1C1C1E;--text:#F5F5F7;--text2:#8E8E93;--text3:#48484A;--border:rgba(255,255,255,0.08);--accent:#6366F1;--accent2:#8B5CF6;}
}
html{-webkit-font-smoothing:antialiased;height:100%;}
body{
  background:var(--bg);font-family:var(--sans);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  position:relative;overflow:hidden;
}

/* ── animated background orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(79,70,229,.18),transparent 70%);top:-100px;right:-100px;animation:float1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);bottom:-80px;left:-80px;animation:float2 15s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,30px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-40px);}}
@media(prefers-color-scheme:dark){
  .orb1{background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%);}
  .orb2{background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);}
}

/* ── card ── */
.card{
  position:relative;z-index:1;
  background:var(--surface);border:.5px solid var(--border);
  border-radius:24px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.1),0 1px 0 rgba(255,255,255,.8) inset;
  animation:card-in .5s cubic-bezier(.2,.8,.2,1) both;
}
@media(prefers-color-scheme:dark){
  .card{box-shadow:0 20px 60px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.04) inset;}
}
@keyframes card-in{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}

/* ── logo ── */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:40px;}
.logo-img-wrap{
  width:88px;height:88px;border-radius:24px;
  background:#fff;
  box-shadow:0 20px 40px rgba(0,0,0,.18),0 0 0 .5px rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;
  animation:logo-pop .6s .1s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes logo-pop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.logo-img-wrap img{width:76%;height:76%;object-fit:cover;border-radius:16px;}
.logo-name{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text);}

/* ── headings ── */
.login-title{font-size:20px;font-weight:600;letter-spacing:-.4px;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}

/* ── fields ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:7px;}
.input-wrap{position:relative;}
.field input{
  width:100%;background:var(--bg);border:.5px solid var(--border);
  border-radius:12px;padding:12px 44px 12px 14px;
  color:var(--text);font-family:var(--sans);font-size:15px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3.5px rgba(79,70,229,.12);}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  color:var(--text3);transition:color .15s;display:flex;
}
.eye-btn:hover{color:var(--text2);}

/* ── error ── */
.error-box{
  background:rgba(239,68,68,.06);border:.5px solid rgba(239,68,68,.2);
  border-radius:12px;padding:11px 14px;font-size:13px;font-weight:500;
  color:var(--red);margin-bottom:16px;display:none;
  animation:shake .35s ease;
}
.error-box.show{display:flex;align-items:center;gap:9px;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* ── button ── */
.btn{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:980px;padding:13px;
  font-family:var(--sans);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-top:4px;
  position:relative;overflow:hidden;letter-spacing:-.2px;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn:hover::after{background:rgba(255,255,255,.08);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.55;cursor:not-allowed;}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:8px;}
.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── footer ── */
.login-footer{
  position:relative;z-index:1;
  margin-top:24px;font-size:12px;color:var(--text3);
  text-align:center;line-height:1.6;
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-img-wrap">
      <img src="/static/logo2.png" alt="ASSETO" onerror="this.parentElement.innerHTML='<svg width=44 height=44 viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%234F46E5\' stroke-width=\'2\'><rect x=\'3\' y=\'3\' width=\'7\' height=\'7\'/><rect x=\'14\' y=\'3\' width=\'7\' height=\'7\'/><rect x=\'3\' y=\'14\' width=\'7\' height=\'7\'/><rect x=\'14\' y=\'14\' width=\'7\' height=\'7\'/></svg>'">
    </div>
    <div class="logo-name">ASSETO</div>
  </div>

  <div class="login-title">Добро пожаловать</div>
  <p class="login-sub">Войдите в систему управления инвентарём</p>

  <div class="error-box" id="err">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="err-text"></span>
  </div>

  <form onsubmit="doLogin(); return false;" autocomplete="on">
    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
    </div>
    <div class="field">
      <label>Пароль</label>
      <div class="input-wrap">
        <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="eye-btn" onclick="togglePass()" title="Показать пароль">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn" type="submit">
      <span class="btn-inner" id="btn-inner">Войти</span>
    </button>
  </form>
</div>

<div class="login-footer">
  Нет доступа? Обратитесь к администратору системы.<br>
  <span style="opacity:.5;">ASSETO v10 · &copy; 2025</span>
</div>

<script>
let _passVisible = false;
function togglePass() {
  _passVisible = !_passVisible;
  const inp = document.getElementById('pass');
  inp.type = _passVisible ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = _passVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pass').focus(); });
document.getElementById('pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const btn = document.getElementById('btn');
  const inner = document.getElementById('btn-inner');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pass').value;
  if (!email || !password) { showErr('Введите email и пароль'); return; }
  btn.disabled = true;
  inner.innerHTML = '<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Вхожу…';
  hideErr();
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (d.ok) {
      inner.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Успешно';
      btn.style.background = 'linear-gradient(135deg,#34C759,#30B0C7)';
      setTimeout(() => {
        window.location = d.force_password_change ? '/profile?must_change=1' : '/dashboard';
      }, 400);
    } else {
      showErr(d.error || 'Неверный email или пароль');
      btn.disabled = false;
      inner.textContent = 'Войти';
    }
  } catch(e) {
    showErr('Ошибка соединения с сервером');
    btn.disabled = false;
    inner.textContent = 'Войти';
  }
}
function showErr(msg) {
  const box = document.getElementById('err');
  document.getElementById('err-text').textContent = msg;
  box.classList.add('show');
  box.style.animation = 'none';
  requestAnimationFrame(() => { box.style.animation = ''; });
}
function hideErr() { document.getElementById('err').classList.remove('show'); }
</script>
</body>
</html>
