<!DOCTYPE html>
<html lang="ru" data-theme="{{ request.cookies.get('theme','') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>ASSETO — Оборудование</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --surface2: #f2f2f7;
      --surface3: #e5e5ea;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.12);
      --text: #1c1c1e;
      --text2: #6c6c70;
      --text3: #aeaeb2;
      --accent: #4361EE;
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-orange: #FF9500;
      --ios-red: #FF3B30;
      --r: 16px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --surface: rgba(28, 28, 30, 0.85);
      --surface-solid: #1c1c1e;
      --surface2: #2c2c2e;
      --surface3: #3a3a3c;
      --border: rgba(255, 255, 255, 0.1);
      --border2: rgba(255, 255, 255, 0.15);
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #48484a;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 100; height: 60px;
      background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      color: var(--accent); text-decoration: none; font-size: 15px; font-weight: 500;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.2s;
    }
    .back-btn:active { opacity: 0.6; }
    .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }

    /* Content Layout */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px 100px; }

    /* Action Button */
    .btn-primary {
      width: 100%; padding: 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 16px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: var(--sans); margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(67, 97, 238, 0.25);
      transition: all 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    /* List & Cards */
    .list { display: grid; gap: 12px; }
    .card {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 20px; padding: 20px; box-shadow: var(--shadow);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card:active { transform: scale(0.985); filter: brightness(0.97); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    
    .status-chip {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 980px;
    }
    .b-active { background: rgba(67, 97, 238, 0.1); color: var(--accent); }
    .b-done { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); }

    .card-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); font-weight: 500; }
    .meta-item svg { color: var(--text3); }

    /* Progress Bar */
    .progress-container { margin-bottom: 6px; }
    .progress-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-fill.done { background: var(--ios-green); }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); font-weight: 600; }

    /* Empty State */
    .empty-state { text-align: center; padding: 80px 20px; animation: fadeIn 0.5s ease; }
    .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Modal / Sheet */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 500; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .overlay.open { display: flex; }
    @media (min-width: 600px) { .overlay { align-items: center; } }

    .sheet {
      background: var(--surface-solid); width: 100%; max-width: 480px;
      border-radius: 24px 24px 0 0; padding: 24px;
      transform: translateY(40px); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
    }
    @media (min-width: 600px) { .sheet { border-radius: 24px; } }
    .overlay.open .sheet { transform: translateY(0); opacity: 1; }

    .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .sheet-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .sheet-close {
      width: 30px; height: 30px; border-radius: 50%; background: var(--surface2);
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .form-ctrl {
      width: 100%; background: var(--surface2); border: 1.5px solid transparent;
      border-radius: 12px; padding: 12px 14px; color: var(--text);
      font-family: var(--sans); font-size: 15px; outline: none; transition: all 0.2s;
    }
    .form-ctrl:focus { background: var(--surface-solid); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }

    .sheet-foot { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .btn-main {
      padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-p { background: var(--accent); color: #fff; }
    .btn-s { background: var(--surface2); color: var(--text); }
    .btn-main:active { transform: scale(0.96); }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: rgba(28, 28, 30, 0.95); color: #fff; padding: 12px 24px;
      border-radius: 980px; font-size: 14px; font-weight: 500; z-index: 1000;
      backdrop-filter: blur(10px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--ios-red); }
  </style>
  <script src="/static/js/csrf.js"></script>
  <script src="/static/js/app.js"></script>
</head>
<body>

<script>
  (function() {
    const t = localStorage.getItem('asseto-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>

<nav class="nav">
  <div class="nav-left">
    <a href="/dashboard" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Главная
    </a>
    <span class="nav-title">Оборудование</span>
  </div>
</nav>

<div class="container">
  {% if user.role in ('superadmin','aho') %}
  <button class="btn-primary" onclick="open_m()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Начать инвентаризацию
  </button>
  {% endif %}

  <div class="list" id="list">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Загрузка данных...</div>
    </div>
  </div>
</div>

<!-- Modal Sheet -->
<div class="overlay" id="m">
  <div class="sheet">
    <div class="sheet-header">
      <div>
        <div class="sheet-title">Новая сессия</div>
        <div style="font-size: 13px; color: var(--text2); margin-top: 4px;">Запуск процесса проверки активов</div>
      </div>
      <button class="sheet-close" onclick="close_m()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="form-group">
        <label>Название инвентаризации *</label>
        <input id="n-t" class="form-ctrl" placeholder="Напр: Склад Q2 2026">
      </div>
      <div class="form-group">
        <label>Отдел (необязательно)</label>
        <input id="n-d" class="form-ctrl" placeholder="Все отделы">
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn-main btn-s" onclick="close_m()">Отмена</button>
      <button class="btn-main btn-p" onclick="create()">Создать сессию</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function formatDate(s) {
    if (!s) return '—';
    const d = new Date((s.includes('T') ? s : s.replace(' ', 'T')) + 'Z');
    return d.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  async function loadData() {
    try {
      const resp = await fetch('/api/inventory/sessions');
      const sessions = await resp.json();
      const el = document.getElementById('list');
      
      if (!sessions.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <div class="empty-title">Активных сессий нет — создайте первую</div>
          </div>`;
        return;
      }

      el.innerHTML = sessions.map(s => {
        const pct = s.total_items ? Math.round(s.checked_items / s.total_items * 100) : 0;
        const done = s.status === 'completed';
        return `
          <div class="card" onclick="location.href='/inventory/${s.id}'">
            <div class="card-header">
              <span class="card-title">${s.title}</span>
              <span class="status-chip ${done ? 'b-done' : 'b-active'}">${done ? 'Завершено' : 'Активна'}</span>
            </div>
            <div class="card-meta">
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                ${s.created_by_name || '—'}
              </div>
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                ${formatDate(s.created_at)}
              </div>
              ${s.department ? `
                <div class="meta-item">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${s.department}
                </div>
              ` : ''}
            </div>
            <div class="progress-container">
              <div class="progress-track">
                <div class="progress-fill ${done ? 'done' : ''}" style="width: ${pct}%"></div>
              </div>
              <div class="progress-label">
                <span>Проверено ${s.checked_items || 0} / ${s.total_items || 0}</span>
                <span style="color: ${done ? 'var(--ios-green)' : 'var(--accent)'}">${pct}%</span>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      toast('Ошибка загрузки', 'err');
    }
  }

  function open_m() {
    document.getElementById('m').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close_m() {
    document.getElementById('m').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function create() {
    const t = document.getElementById('n-t').value.trim();
    const d = document.getElementById('n-d').value.trim();
    if (!t) { toast('Укажите название', 'err'); return; }
    
    try {
      const resp = await fetch('/api/inventory/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: t, department: d || null })
      });
      const res = await resp.json();
      if (res.ok) {
        toast(`Создана — ${res.total_items} активов ✓`);
        close_m();
        document.getElementById('n-t').value = '';
        loadData();
      } else toast(res.error || 'Ошибка', 'err');
    } catch (e) { toast('Ошибка сети', 'err'); }
  }

  function toast(m, t = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = m;
    el.className = 'toast show' + (t === 'err' ? ' err' : '');
    clearTimeout(el._tid);
    el._tid = setTimeout(() => el.classList.remove('show'), 3000);
  }

  document.getElementById('m').addEventListener('click', e => {
    if (e.target === document.getElementById('m')) close_m();
  });

  loadData();
</script>
</body>
</html>
