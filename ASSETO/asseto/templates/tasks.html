{% extends "base.html" %}
{% block title %}ASSETO — Задачи{% endblock %}

{% block head %}
<style>
.task-page { padding:0; max-width:100%; color:var(--text); }
.task-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
.task-header h1 { font-size:28px; font-weight:800; color:var(--text); }
.task-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.task-filters select, .task-filters button { padding:8px 14px; border-radius:10px; background:var(--surface); border:.5px solid var(--border); color:var(--text); font-size:13px; cursor:pointer; }
.task-filters select option { background:var(--surface); color:var(--text); }
.task-filters button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.task-board { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px; }
.task-col { background:var(--surface2); border-radius:16px; padding:12px; min-height:200px; }
.task-col-head { font-size:13px; font-weight:700; padding:8px 12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; color:var(--text); }
.task-col-count { font-size:11px; color:var(--text2); background:var(--surface); padding:2px 8px; border-radius:10px; }

.task-card { background:var(--surface); border:.5px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all .15s; }
.task-card:hover { border-color:var(--accent); box-shadow:0 4px 16px rgba(128,128,128,.25); }
.task-card-title { font-size:14px; font-weight:600; margin-bottom:6px; color:var(--text); }
.task-card-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:11px; color:var(--text2); }
.task-card-meta .badge { padding:2px 8px; border-radius:8px; font-weight:700; font-size:10px; }
.task-card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; color:var(--text2); }
.task-card-avatar { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; }

/* Modal */
.sheet { max-width:700px; background:var(--surface); color:var(--text); }
.task-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.task-detail-grid .fg { margin:0; }
.fg label { display:block; font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
.fg input, .fg select, .fg textarea { width:100%; padding:9px 12px; border-radius:10px; background:var(--surface2); border:.5px solid var(--border); color:var(--text); font-size:13px; box-sizing:border-box; }
.fg select option { background:var(--surface); color:var(--text); }
.fg textarea { min-height:80px; resize:vertical; }

.checklist-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px; color:var(--text); }
.checklist-item:hover { background:var(--surface2); }
.checklist-item input[type=checkbox] { width:18px; height:18px; cursor:pointer; accent-color:var(--accent); }
.checklist-item .done-text { text-decoration:line-through; color:var(--text3); }
.checklist-progress { height:4px; background:var(--surface2); border-radius:2px; margin:4px 0 10px; }
.checklist-progress-bar { height:100%; background:var(--ios-green); border-radius:2px; transition:width .3s; }

.comment-item { padding:10px 12px; border-bottom:.5px solid var(--border); }
.comment-author { font-size:12px; font-weight:700; margin-bottom:2px; color:var(--text); }
.comment-body { font-size:13px; color:var(--text); }
.comment-time { font-size:10px; color:var(--text3); }

#task-modal .sheet-body { max-height:60vh; overflow-y:auto; }
#task-modal .sheet-head { color:var(--text); }
#task-modal .sheet-foot { background:var(--surface); }
</style>
{% endblock %}

{% block content %}
<div class="task-page">
  <div class="task-header">
    <h1>📋 Задачи</h1>
    <button class="btn btn-primary" onclick="openNewTask()">+ Новая задача</button>
  </div>

  <!-- Filters -->
  <div class="task-filters">
    <button class="active" onclick="setFilter('all', this)">Все</button>
    <button onclick="setFilter('my', this)">Мои</button>
    <select id="f-status" onchange="renderBoard()">
      <option value="">Все статусы</option>
      {% for k, v in status_labels.items() %}
      <option value="{{ k }}">{{ v }}</option>
      {% endfor %}
    </select>
    <select id="f-priority" onchange="renderBoard()">
      <option value="">Все приоритеты</option>
      {% for k, v in priority_labels.items() %}
      <option value="{{ k }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Kanban Board -->
  <div class="task-board" id="board">
    {% for s in statuses %}
    <div class="task-col" data-status="{{ s }}">
      <div class="task-col-head">
        <span>{{ status_labels[s] }}</span>
        <span class="task-col-count">0</span>
      </div>
      <div class="task-col-body"></div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Task Detail Modal -->
<div class="overlay" id="task-modal">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title" id="tm-title">Новая задача</div>
      <button class="sheet-x" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg"><label>Название *</label><input id="tm-name" placeholder="Что нужно сделать?"></div>
      <div class="task-detail-grid">
        <div class="fg"><label>Статус</label><select id="tm-status">{% for k,v in status_labels.items() %}<option value="{{k}}">{{v}}</option>{% endfor %}</select></div>
        <div class="fg"><label>Приоритет</label><select id="tm-priority">{% for k,v in priority_labels.items() %}<option value="{{k}}">{{v}}</option>{% endfor %}</select></div>
        <div class="fg"><label>Исполнитель</label><select id="tm-responsible"><option value="">— назначить —</option></select></div>
        <div class="fg"><label>Дедлайн</label><input id="tm-deadline" type="datetime-local"></div>
        <div class="fg"><label>План (часов)</label><input id="tm-hours" type="number" step="0.5" min="0"></div>
      </div>
      <div class="fg"><label>Описание</label><textarea id="tm-desc" placeholder="Подробности задачи..."></textarea></div>

      <!-- Checklist -->
      <div style="margin-top:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <label style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">Чек-лист</label>
          <button class="btn btn-ghost btn-sm" onclick="addChecklistItem()">+ пункт</button>
        </div>
        <div id="tm-checklist"></div>
        <div class="checklist-progress"><div class="checklist-progress-bar" id="tm-cl-progress" style="width:0%"></div></div>
      </div>

      <!-- Comments -->
      <div style="margin-top:16px;" id="tm-comments-section" >
        <label style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">Комментарии</label>
        <div id="tm-comments" style="background:var(--surface2);border-radius:12px;overflow:hidden;margin:6px 0;"></div>
        <div style="display:flex;gap:8px;">
          <input id="tm-comment-input" placeholder="Написать комментарий..." style="flex:1;padding:9px 12px;border-radius:10px;background:var(--surface2);border:.5px solid var(--border);color:var(--text);font-size:13px;">
          <button class="btn btn-primary btn-sm" onclick="addComment()">Отпр.</button>
        </div>
      </div>

      <!-- Time -->
      <div style="margin-top:16px;">
        <label style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">Учёт времени</label>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
          <input id="tm-time-minutes" type="number" min="1" placeholder="Минуты" style="width:80px;padding:8px;border-radius:8px;background:var(--surface2);border:.5px solid var(--border);color:var(--text);font-size:13px;">
          <input id="tm-time-desc" placeholder="Что сделано?" style="flex:1;padding:8px 12px;border-radius:8px;background:var(--surface2);border:.5px solid var(--border);color:var(--text);font-size:13px;">
          <button class="btn btn-primary btn-sm" onclick="logTime()">+</button>
        </div>
        <div id="tm-time-logs" style="margin-top:8px;font-size:12px;"></div>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Отмена</button>
      <button class="btn btn-danger btn-sm" id="tm-delete-btn" style="display:none;margin-right:auto;" onclick="deleteTask()">🗑 Удалить</button>
      <button class="btn btn-primary" onclick="saveTask()">Сохранить</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const STATUS_LABELS = {{ status_labels|tojson }};
const PRIORITY_LABELS = {{ priority_labels|tojson }};
const PRIORITY_COLORS = {{ priority_colors|tojson }};
const AVATAR_COLORS = ['#4361EE','#7B2FBE','#06D6A0','#FF9F0A','#5856D6','#FF3B30','#30B0C7'];

let tasks = [], users = [], currentTaskId = null, currentFilter = 'all';

async function load() {
  try {
    const params = new URLSearchParams();
    const status = document.getElementById('f-status').value;
    const priority = document.getElementById('f-priority').value;
    if (status) params.set('status', status);
    if (priority) params.set('priority', priority);
    if (currentFilter === 'my') params.set('my', '1');
    tasks = await (await fetch('/api/tasks?' + params)).json();
    users = await (await fetch('/api/tasks/users')).json();
    renderBoard();
    buildUserSelect();
  } catch(e) { console.error(e); }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.task-filters button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  load();
}

function buildUserSelect() {
  const sel = document.getElementById('tm-responsible');
  sel.innerHTML = '<option value="">— назначить —</option>' + users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
}

function renderBoard() {
  document.querySelectorAll('.task-col-body').forEach(b => b.innerHTML = '');
  document.querySelectorAll('.task-col-count').forEach(c => c.textContent = '0');

  const byStatus = {};
  tasks.forEach(t => { (byStatus[t.status] = byStatus[t.status] || []).push(t); });

  for (const [status, items] of Object.entries(byStatus)) {
    const col = document.querySelector(`.task-col[data-status="${status}"] .task-col-body`);
    const cnt = document.querySelector(`.task-col[data-status="${status}"] .task-col-count`);
    if (!col) continue;
    if (cnt) cnt.textContent = items.length;
    col.innerHTML = items.map(t => renderCard(t)).join('');
  }
}

function renderCard(t) {
  const pc = PRIORITY_COLORS[t.priority] || '#8E8E93';
  const cl = t.checklist_total ? Math.round((t.checklist_done||0)/t.checklist_total*100) : 0;
  const avClr = AVATAR_COLORS[(t.responsible_id||0) % AVATAR_COLORS.length];
  return `<div class="task-card" onclick="openTask(${t.id})">
    <div class="task-card-title">${escHtml(t.title)}</div>
    <div class="task-card-meta">
      <span class="badge" style="background:${pc}18;color:${pc};">${PRIORITY_LABELS[t.priority]||t.priority}</span>
      ${t.deadline ? `<span>⏰ ${fmtDeadline(t.deadline)}</span>` : ''}
      ${cl > 0 ? `<span>✅ ${cl}%</span>` : ''}
    </div>
    <div class="task-card-footer">
      <div class="task-card-avatar" style="background:${avClr}" title="${escHtml(t.responsible_name||'')}">${(t.responsible_name||'?')[0].toUpperCase()}</div>
      ${t.total_minutes ? `<span style="font-size:10px;color:var(--text3);">🕐 ${Math.round(t.total_minutes/60*10)/10}ч</span>` : ''}
    </div>
  </div>`;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDeadline(d) { if(!d) return ''; const dt = new Date(d); return dt.toLocaleDateString('ru-RU', {day:'2-digit',month:'short'}); }

// ── Task Modal ──
function openNewTask() {
  currentTaskId = null;
  document.getElementById('tm-title').textContent = 'Новая задача';
  ['tm-name','tm-desc','tm-deadline','tm-hours'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tm-status').value = 'new';
  document.getElementById('tm-priority').value = 'medium';
  document.getElementById('tm-responsible').value = '';
  document.getElementById('tm-checklist').innerHTML = '';
  document.getElementById('tm-comments').innerHTML = '';
  document.getElementById('tm-time-logs').innerHTML = '';
  document.getElementById('tm-comments-section').style.display = 'none';
  document.getElementById('tm-delete-btn').style.display = 'none';
  updateClProgress();
  document.getElementById('task-modal').classList.add('open');
}

async function openTask(id) {
  currentTaskId = id;
  const t = await (await fetch('/api/tasks/' + id)).json();
  document.getElementById('tm-title').textContent = '✏️ ' + t.title;
  document.getElementById('tm-name').value = t.title;
  document.getElementById('tm-desc').value = t.description||'';
  document.getElementById('tm-status').value = t.status;
  document.getElementById('tm-priority').value = t.priority;
  document.getElementById('tm-responsible').value = t.responsible_id||'';
  document.getElementById('tm-deadline').value = t.deadline ? t.deadline.replace(' ','T') : '';
  document.getElementById('tm-hours').value = t.planned_hours||'';
  document.getElementById('tm-comments-section').style.display = 'block';
  document.getElementById('tm-delete-btn').style.display = 'inline-flex';

  // Checklist
  document.getElementById('tm-checklist').innerHTML = (t.checklist||[]).map(c => `
    <div class="checklist-item">
      <input type="checkbox" ${c.done?'checked':''} onchange="toggleChecklistItem(${c.id}, this.checked)" data-cid="${c.id}">
      <span class="${c.done?'done-text':''}">${escHtml(c.text)}</span>
      <button style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;" onclick="delChecklistItem(${c.id})">✕</button>
    </div>`).join('');
  updateClProgress();

  // Comments
  document.getElementById('tm-comments').innerHTML = (t.comments||[]).map(c => `
    <div class="comment-item">
      <div class="comment-author">${escHtml(c.author_name||'?')} <span class="comment-time">${fmtDeadline(c.created_at)}</span></div>
      <div class="comment-body">${escHtml(c.body)}</div>
    </div>`).join('');

  // Time logs
  document.getElementById('tm-time-logs').innerHTML = (t.time_logs||[]).map(l => `
    <div style="padding:4px 0;border-bottom:.5px solid var(--border);">🕐 ${l.minutes} мин — ${escHtml(l.description||'')} <span style="color:var(--text3);font-size:10px;">${fmtDeadline(l.created_at)}</span></div>
  `).join('');

  document.getElementById('task-modal').classList.add('open');
}

function closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); }

async function saveTask() {
  const payload = {
    title: document.getElementById('tm-name').value.trim(),
    description: document.getElementById('tm-desc').value,
    status: document.getElementById('tm-status').value,
    priority: document.getElementById('tm-priority').value,
    responsible_id: document.getElementById('tm-responsible').value || null,
    deadline: document.getElementById('tm-deadline').value || null,
    planned_hours: parseFloat(document.getElementById('tm-hours').value) || null
  };
  if (!payload.title) return alert('Введите название задачи');

  const url = currentTaskId ? '/api/tasks/' + currentTaskId : '/api/tasks';
  const method = currentTaskId ? 'PUT' : 'POST';
  const r = await (await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) })).json();
  if (r.ok) { closeTaskModal(); load(); }
  else alert(r.error||'Ошибка');
}

async function deleteTask() {
  if (!currentTaskId || !confirm('Удалить задачу?')) return;
  await fetch('/api/tasks/' + currentTaskId, { method:'DELETE' });
  closeTaskModal(); load();
}

// Checklist
async function addChecklistItem() {
  if (!currentTaskId) return alert('Сначала сохраните задачу');
  const text = prompt('Текст пункта:');
  if (!text) return;
  await fetch('/api/tasks/' + currentTaskId + '/checklist', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})
  });
  openTask(currentTaskId);
}

async function toggleChecklistItem(cid, done) {
  await fetch('/api/tasks/' + currentTaskId + '/checklist/' + cid, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({done: done?1:0})
  });
  updateClProgress();
}

async function delChecklistItem(cid) {
  await fetch('/api/tasks/' + currentTaskId + '/checklist/' + cid, { method:'DELETE' });
  openTask(currentTaskId);
}

function updateClProgress() {
  const checks = document.querySelectorAll('#tm-checklist input[type=checkbox]');
  if (!checks.length) { document.getElementById('tm-cl-progress').style.width = '0%'; return; }
  const done = [...checks].filter(c => c.checked).length;
  document.getElementById('tm-cl-progress').style.width = Math.round(done/checks.length*100) + '%';
}

// Comments
async function addComment() {
  if (!currentTaskId) return alert('Сначала сохраните задачу');
  const body = document.getElementById('tm-comment-input').value.trim();
  if (!body) return;
  const r = await (await fetch('/api/tasks/' + currentTaskId + '/comments', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({body})
  })).json();
  if (r.ok) { document.getElementById('tm-comment-input').value = ''; openTask(currentTaskId); }
}

// Time
async function logTime() {
  if (!currentTaskId) return alert('Сначала сохраните задачу');
  const mins = parseInt(document.getElementById('tm-time-minutes').value);
  const desc = document.getElementById('tm-time-desc').value;
  if (!mins || mins <= 0) return alert('Укажите минуты');
  const r = await (await fetch('/api/tasks/' + currentTaskId + '/time', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({minutes:mins, description:desc})
  })).json();
  if (r.ok) { document.getElementById('tm-time-minutes').value = ''; document.getElementById('tm-time-desc').value = ''; openTask(currentTaskId); }
}

document.getElementById('task-modal').addEventListener('click', e => { if (e.target === document.getElementById('task-modal')) closeTaskModal(); });
document.getElementById('f-status').addEventListener('change', load);
document.getElementById('f-priority').addEventListener('change', load);

load();
</script>
{% endblock %}
