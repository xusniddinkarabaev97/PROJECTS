<!DOCTYPE html>
<html lang="ru" data-theme="{{ request.cookies.get('theme','') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Безопасность — ASSETO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --surface2: #f2f2f7;
      --surface3: #e5e5ea;
      --border: rgba(0, 0, 0, 0.08);
      --text: #1c1c1e;
      --text2: #6c6c70;
      --text3: #aeaeb2;
      --accent: #4361EE;
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-red: #FF3B30;
      --ios-orange: #FF9500;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --surface: rgba(28, 28, 30, 0.8);
      --surface-solid: #1c1c1e;
      --surface2: #2c2c2e;
      --surface3: #3a3a3c;
      --border: rgba(255, 255, 255, 0.1);
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #48484a;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; line-height: 1.4; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid var(--border);
      height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    }
    .nav-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      color: var(--accent); text-decoration: none; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.7; }
    .nav-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

    .content { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

    /* Stats */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 24px; padding: 24px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 20px; transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 56px; height: 56px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .stat-info { display: flex; flex-direction: column; }
    .stat-n { font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .stat-l { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    /* Colors */
    .c-blue { background: rgba(67, 97, 238, 0.1); color: #4361EE; }
    .c-green { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); }
    .c-red { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 300px; position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); pointer-events: none;
    }
    .search-input {
      width: 100%; background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 14px; padding: 12px 14px 12px 42px; color: var(--text);
      font-family: var(--sans); font-size: 15px; outline: none; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }

    .filt-select {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 14px; padding: 12px 16px; color: var(--text);
      font-family: var(--sans); font-size: 15px; font-weight: 500; outline: none; cursor: pointer;
      min-width: 160px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    /* Table */
    .table-card {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 24px; overflow: hidden; box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface2); padding: 14px 20px; text-align: left;
      font-size: 12px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 1px; border-bottom: .5px solid var(--border);
    }
    td { padding: 16px 20px; border-bottom: .5px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(67, 97, 238, 0.02); }

    .user-cell { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-weight: 700; color: var(--text); }
    .user-email { font-size: 12px; color: var(--text2); font-weight: 500; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 700;
    }
    .b-ok { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); }
    .b-fail { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); }

    .ip-code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px; color: var(--text2); background: var(--surface2);
      padding: 4px 8px; border-radius: 6px;
    }
    .ts-cell { color: var(--text2); font-weight: 500; font-size: 13px; }

    /* Pagination */
    .pager { display: flex; justify-content: center; gap: 8px; margin-top: 32px; }
    .p-btn {
      width: 40px; height: 40px; border-radius: 12px; border: .5px solid var(--border);
      background: var(--surface-solid); color: var(--text2); font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .p-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text3); }
    .p-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3); }

    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: 1fr; }
      th:nth-child(2), td:nth-child(2), th:nth-child(4), td:nth-child(4) { display: none; }
    }

    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="/" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Главная
    </a>
    <span class="nav-title">Журнал безопасности</span>
  </div>
  <div class="nav-right">
    <!-- Theme toggle or profile could go here -->
  </div>
</nav>

<div class="content">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon c-blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-n" id="st-total">{{ logs|length }}</span>
        <span class="stat-l">Всего событий</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon c-green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-n" id="st-ok">—</span>
        <span class="stat-l">Успешные входы</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon c-red">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-n" id="st-fail">—</span>
        <span class="stat-l">Отказы в доступе</span>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="search-input" id="q" placeholder="Поиск по имени, email или IP..." oninput="filter()">
    </div>
    <select class="filt-select" id="sf" onchange="filter()">
      <option value="">Все статусы</option>
      <option value="ok">Только успешные</option>
      <option value="fail">Только отказы</option>
    </select>
  </div>

  <div class="table-card">
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Пользователь</th>
            <th>Email</th>
            <th>Статус</th>
            <th>IP-адрес</th>
            <th>Время</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="pager" id="pager"></div>
</div>

<script>
  const ALL = {{ logs | tojson }};
  let filtered = [...ALL], page = 0;
  const PER = 20;

  // Initial stats calculation
  document.getElementById('st-ok').textContent = ALL.filter(r => r.success).length;
  document.getElementById('st-fail').textContent = ALL.filter(r => !r.success).length;

  function ts(s) {
    if(!s) return '—';
    const d = new Date((s.includes('T') ? s : s.replace(' ','T')) + 'Z');
    return d.toLocaleString('ru', {
      day: '2-digit', 
      month: 'short', 
      hour: '2-digit', 
      minute: '2-digit'
    });
  }

  function filter() {
    const q = document.getElementById('q').value.toLowerCase();
    const sf = document.getElementById('sf').value;
    filtered = ALL.filter(r => {
      const txt = [r.email || '', r.name || '', r.ip || ''].join(' ').toLowerCase();
      const matchStatus = !sf || (sf === 'ok' ? r.success : !r.success);
      return txt.includes(q) && matchStatus;
    });
    page = 0;
    render();
  }

  function render() {
    const start = page * PER;
    const slice = filtered.slice(start, start + PER);
    const tbody = document.getElementById('tbody');
    
    if (slice.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:48px;color:var(--text3);font-weight:500;">Событий не найдено</td></tr>`;
    } else {
      tbody.innerHTML = slice.map((r, idx) => `
        <tr class="fade-in" style="animation-delay: ${idx * 0.03}s">
          <td>
            <div class="user-cell">
              <span class="user-name">${r.name || 'Неизвестно'}</span>
            </div>
          </td>
          <td><span class="user-email">${r.email || '—'}</span></td>
          <td>
            ${r.success 
              ? '<span class="badge b-ok"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Успех</span>' 
              : '<span class="badge b-fail"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Отказ</span>'}
          </td>
          <td><span class="ip-code">${r.ip || '—'}</span></td>
          <td class="ts-cell">${ts(r.ts)}</td>
        </tr>
      `).join('');
    }

    const pages = Math.ceil(filtered.length / PER);
    const pager = document.getElementById('pager');
    if (pages <= 1) {
      pager.innerHTML = '';
    } else {
      let html = '';
      const startP = Math.max(0, page - 2);
      const endP = Math.min(pages, startP + 5);
      
      for (let i = startP; i < endP; i++) {
        html += `<button class="p-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
      }
      pager.innerHTML = html;
    }
  }

  function goPage(n) {
    page = n;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Set theme from cookie initially
  const theme = document.documentElement.getAttribute('data-theme');
  if (!theme) {
    const saved = localStorage.getItem('asseto-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', saved);
  }

  render();
</script>
</body>
</html>
