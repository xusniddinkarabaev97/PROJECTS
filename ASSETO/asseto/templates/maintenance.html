<!DOCTYPE html>
<html lang="ru" data-theme="{{ request.cookies.get('theme','') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>ASSETO — Ремонты</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/static/js/csrf.js?v=2"></script>
  <style>
    :root {
      --bg: #f2f2f7;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --surface2: #f2f2f7;
      --surface3: #e5e5ea;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.12);
      --text: #1c1c1e;
      --text2: #6c6c70;
      --text3: #aeaeb2;
      --accent: #4361EE;
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-orange: #FF9500;
      --ios-red: #FF3B30;
      --r: 16px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --surface: rgba(28, 28, 30, 0.85);
      --surface-solid: #1c1c1e;
      --surface2: #2c2c2e;
      --surface3: #3a3a3c;
      --border: rgba(255, 255, 255, 0.1);
      --border2: rgba(255, 255, 255, 0.15);
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #48484a;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 100; height: 60px;
      background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      color: var(--accent); text-decoration: none; font-size: 15px; font-weight: 500;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.2s;
    }
    .back-btn:active { opacity: 0.6; }
    .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }

    /* Content Layout */
    .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 100px; }

    /* KPI Grid */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 640px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    
    .kpi-card {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 18px; padding: 20px 16px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; align-items: center; text-align: center;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .kpi-card:active { transform: scale(0.97); }
    .kpi-val { font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -1px; margin-bottom: 6px; }
    .kpi-lab { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Segmented Filter */
    .filters-wrap {
      background: var(--surface2); border-radius: 12px; padding: 3px;
      display: flex; gap: 2px; margin-bottom: 24px; position: relative;
    }
    .filter-btn {
      flex: 1; border: none; background: transparent; padding: 8px 10px;
      border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; font-family: var(--sans); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .filter-btn.active { background: var(--surface-solid); color: var(--text); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
    
    /* List & Cards */
    .repair-list { display: grid; gap: 12px; }
    .repair-card {
      background: var(--surface-solid); border: .5px solid var(--border);
      border-radius: 20px; padding: 20px; box-shadow: var(--shadow);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }
    .repair-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .repair-card:active { transform: scale(0.985); filter: brightness(0.97); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-info { flex: 1; display: flex; align-items: center; gap: 12px; }
    .cat-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      flex-shrink: 0;
    }
    .item-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
    .item-inv { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; font-weight: 600; color: var(--accent); margin-top: 2px; }
    
    .status-chip {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 980px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .status-chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .card-body { margin-bottom: 16px; }
    .card-desc { font-size: 14px; color: var(--text2); line-height: 1.5; }
    
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; border-top: .5px solid var(--border);
    }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text3); }
    .prio-badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: 0.02em;
    }

    /* Badges Style */
    .b-pending { background: rgba(255, 149, 0, 0.12); color: var(--ios-orange); }
    .b-progress { background: rgba(0, 122, 255, 0.12); color: var(--ios-blue); }
    .b-done { background: rgba(52, 199, 89, 0.12); color: var(--ios-green); }
    .b-canc { background: var(--surface3); color: var(--text3); }

    .p-low { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); }
    .p-med { background: rgba(255, 149, 0, 0.1); color: var(--ios-orange); }
    .p-high { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); }
    .p-crit { background: var(--ios-red); color: #fff; box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3); }

    /* Modal / Sheet */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 500; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; transition: opacity 0.3s;
    }
    .overlay.open { display: flex; opacity: 1; }
    @media (min-width: 640px) { .overlay { align-items: center; } }

    .sheet {
      background: var(--surface-solid); width: 100%; max-width: 480px;
      border-radius: 24px 24px 0 0; padding: 24px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
    }
    @media (min-width: 640px) { .sheet { border-radius: 24px; transform: translateY(20px); } }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .sheet-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .sheet-close {
      width: 30px; height: 30px; border-radius: 50%; background: var(--surface2);
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .form-ctrl {
      width: 100%; background: var(--surface2); border: 1.5px solid transparent;
      border-radius: 12px; padding: 12px 14px; color: var(--text);
      font-family: var(--sans); font-size: 15px; outline: none; transition: all 0.2s;
    }
    .form-ctrl:focus { background: var(--surface-solid); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
    textarea.form-ctrl { resize: none; height: 100px; }

    .sheet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .btn-main {
      padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-main:active { transform: scale(0.96); }

    /* Empty State */
    .empty-state { text-align: center; padding: 80px 20px; animation: fadeIn 0.5s ease; }
    .empty-icon { font-size: 64px; margin-bottom: 20px; filter: grayscale(1) opacity(0.3); }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: rgba(28, 28, 30, 0.95); color: #fff; padding: 12px 24px;
      border-radius: 980px; font-size: 14px; font-weight: 500; z-index: 1000;
      backdrop-filter: blur(10px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--ios-red); }

    /* Excel Button */
    .excel-btn {
      background: var(--surface2); color: var(--text); padding: 8px 16px;
      border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .excel-btn:hover { background: var(--surface3); }
  </style>
</head>
<body>

<script>
  // Instant theme apply
  (function() {
    const t = localStorage.getItem('asseto-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>

<nav class="nav">
  <div class="nav-left">
    <a href="/dashboard" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Главная
    </a>
    <span class="nav-title">Ремонты</span>
  </div>
  <div class="nav-right">
    {% if role_info.get('can_export') %}
    <a href="/api/export/maintenance" class="excel-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Excel
    </a>
    {% endif %}
  </div>
</nav>

<div class="container">
  <!-- KPI Row -->
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-val" id="cn-p" style="color:var(--ios-orange);">0</div><div class="kpi-lab">Ожидают</div></div>
    <div class="kpi-card"><div class="kpi-val" id="cn-i" style="color:var(--ios-blue);">0</div><div class="kpi-lab">В работе</div></div>
    <div class="kpi-card"><div class="kpi-val" id="cn-d" style="color:var(--ios-green);">0</div><div class="kpi-lab">Готово</div></div>
    <div class="kpi-card"><div class="kpi-val" id="cn-c" style="color:var(--ios-red);">0</div><div class="kpi-lab">Критично</div></div>
  </div>

  <!-- Segmented Filter -->
  <div class="filters-wrap">
    <button class="filter-btn active" data-f="" onclick="flt('', this)">Все</button>
    <button class="filter-btn" data-f="pending" onclick="flt('pending', this)">Ожидают</button>
    <button class="filter-btn" data-f="in_progress" onclick="flt('in_progress', this)">В работе</button>
    <button class="filter-btn" data-f="completed" onclick="flt('completed', this)">Готово</button>
    <button class="filter-btn" data-f="crit" onclick="flt('crit', this)">Критично</button>
  </div>

  <!-- Main List -->
  <div class="repair-list" id="list">
    <div class="empty-state">
      <div class="empty-icon">🔧</div>
      <div class="empty-title">Загрузка данных...</div>
    </div>
  </div>
</div>

<!-- Modal Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="m-title">Управление статусом</div>
        <div style="font-size: 13px; color: var(--text2); margin-top: 4px;" id="m-sub"></div>
      </div>
      <button class="sheet-close" onclick="close_m()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="sheet-body">
      <div class="form-group">
        <label>Статус ремонта</label>
        <select id="m-st" class="form-ctrl">
          <option value="in_progress">🔧 Взять в работу</option>
          <option value="completed">✅ Завершить ремонт</option>
          <option value="cancelled">✕ Отменить заявку</option>
        </select>
      </div>
      <div class="form-group">
        <label>Комментарий / Результат</label>
        <textarea id="m-nt" class="form-ctrl" placeholder="Опишите, что было сделано..."></textarea>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn-main btn-secondary" onclick="close_m()">Отмена</button>
      <button class="btn-main btn-primary" onclick="do_resolve()">Сохранить изменения</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const USER_ROLE = "{{ user.role }}";
  const PRIO_LABELS = { low: 'Низкий', medium: 'Средний', high: 'Высокий', critical: 'Критический' };
  const PRIO_CLASSES = { low: 'p-low', medium: 'p-med', high: 'p-high', critical: 'p-crit' };
  const STATUS_LABELS = { pending: 'Ожидает', in_progress: 'В работе', completed: 'Завершено', cancelled: 'Отменено' };
  const STATUS_CLASSES = { pending: 'b-pending', in_progress: 'b-progress', completed: 'b-done', cancelled: 'b-canc' };
  
  const CAT_CONFIG = { 
    'Ноутбук': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="20" x2="22" y2="20"></line></svg>', color: '#5856D6' },
    'Монитор': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>', color: '#007AFF' },
    'Кресло': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6V3a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v3"></path><path d="M3 13v-3a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3"></path><path d="M5 13h14l1 7H4l1-7z"></path><path d="M15 13v-3"></path><path d="M9 13v-3"></path></svg>', color: '#AF52DE' },
    'Стол': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"></path><path d="M3 12h18"></path><path d="M3 3h18v18H3z"></path></svg>', color: '#A2845E' },
    'Принтер': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>', color: '#32ADE6' },
    'Телефон': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>', color: '#34C759' },
    'Клавиатура': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="6" y1="9" x2="6" y2="9"></line><line x1="10" y1="9" x2="10" y2="9"></line><line x1="14" y1="9" x2="14" y2="9"></line><line x1="18" y1="9" x2="18" y2="9"></line><line x1="6" y1="13" x2="6" y2="13"></line><line x1="10" y1="13" x2="14" y2="13"></line><line x1="18" y1="13" x2="18" y2="13"></line></svg>', color: '#8E8E93' },
    'Мышь': { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="7" ry="7"></rect><line x1="12" y1="2" x2="12" y2="9"></line></svg>', color: '#FF9500' }
  };
  
  let repairs = [], currentId = null;

  function formatDate(s) {
    if (!s) return '—';
    const d = new Date((s.includes('T') ? s : s.replace(' ', 'T')) + 'Z');
    return d.toLocaleString('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  async function loadData() {
    try {
      const resp = await fetch('/api/maintenance');
      const data = await resp.json();
      repairs = Array.isArray(data) ? data : [];
      
      document.getElementById('cn-p').textContent = repairs.filter(x => x.status === 'pending').length;
      document.getElementById('cn-i').textContent = repairs.filter(x => x.status === 'in_progress').length;
      document.getElementById('cn-d').textContent = repairs.filter(x => x.status === 'completed').length;
      document.getElementById('cn-c').textContent = repairs.filter(x => x.priority === 'critical').length;
      
      render(repairs);
    } catch (e) {
      console.error(e);
      toast('Ошибка загрузки данных', 'err');
    }
  }

  function flt(val, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    let filtered = repairs;
    if (val === 'crit') filtered = repairs.filter(x => x.priority === 'critical');
    else if (val) filtered = repairs.filter(x => x.status === val);
    
    render(filtered);
  }

  function render(rows) {
    const list = document.getElementById('list');
    if (!rows.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div class="empty-title">Заявок пока нет</div>
        </div>`;
      return;
    }

    const canAct = ['superadmin', 'aho'].includes(USER_ROLE);
    
    list.innerHTML = rows.map(r => {
      const conf = CAT_CONFIG[r.category] || { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>', color: '#8E8E93' };
      const statusClass = STATUS_CLASSES[r.status] || 'b-canc';
      const prioClass = PRIO_CLASSES[r.priority] || 'p-med';
      
      return `
        <div class="repair-card" ${canAct && r.status !== 'completed' ? `onclick="open_m(${r.id}, '${(r.inv_num||'').replace(/'/g, "")}', '${(r.category||'').replace(/'/g, "")}')"` : 'style="cursor:default;"'}>
          <div class="card-header">
            <div class="card-info">
              <div class="cat-icon" style="background: ${conf.color}15; color: ${conf.color};">
                ${conf.icon}
              </div>
              <div>
                <div class="item-name">${r.category || 'Актив'} ${r.model ? '· ' + r.model : ''}</div>
                <div class="item-inv">${r.inv_num || 'БЕЗ ИНВ.'}</div>
              </div>
            </div>
            <span class="status-chip ${statusClass}">${STATUS_LABELS[r.status] || r.status}</span>
          </div>
          <div class="card-body">
            <div class="card-desc">${r.description || 'Нет описания'}</div>
          </div>
          <div class="card-footer">
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${r.room || '—'}
              </div>
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                ${r.reported_by_name || '—'}
              </div>
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${formatDate(r.created_at)}
              </div>
            </div>
            <span class="prio-badge ${prioClass}">${PRIO_LABELS[r.priority] || r.priority}</span>
          </div>
          ${r.resolved_at ? `<div style="font-size:11px; color:var(--text3); margin-top:10px; text-align:right;">✓ Решено ${formatDate(r.resolved_at)}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function open_m(id, inv, cat) {
    currentId = id;
    document.getElementById('m-title').textContent = inv || cat;
    document.getElementById('m-sub').textContent = 'Обновление статуса ремонта';
    document.getElementById('m-nt').value = '';
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close_m() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function do_resolve() {
    const st = document.getElementById('m-st').value;
    const nt = document.getElementById('m-nt').value.trim();
    
    try {
      const resp = await fetch(`/api/maintenance/${currentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: st, resolution: nt })
      });
      const d = await resp.json();
      if (d.ok) {
        toast('Статус обновлен ✓');
        close_m();
        loadData();
      } else {
        toast(d.error || 'Ошибка сохранения', 'err');
      }
    } catch (e) {
      toast('Ошибка сети', 'err');
    }
  }

  function toast(m, t = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = m;
    el.className = 'toast show' + (t === 'err' ? ' err' : '');
    clearTimeout(el._tid);
    el._tid = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Initial load
  loadData();
</script>
</body>
</html>
