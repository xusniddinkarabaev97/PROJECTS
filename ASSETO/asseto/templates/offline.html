<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Нет соединения — ASSETO</title>
  <link rel="stylesheet" href="/static/css/asseto-ios.css">
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:24px; }
    .offline-wrap { max-width:360px; }
    .offline-icon { font-size:72px;margin-bottom:24px;animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(0.97)} }
    .offline-title { font-size:28px;font-weight:900;letter-spacing:-.7px;margin-bottom:12px; }
    .offline-sub { font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:28px; }
    .cached-note { font-size:13px;color:var(--text3);margin-top:16px; }
  </style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-icon">📡</div>
    <div class="offline-title">Нет соединения</div>
    <p class="offline-sub">ASSETO не может подключиться к серверу. Проверьте интернет и попробуйте снова.</p>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="tryReconnect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Повторить подключение
    </button>
    <p class="cached-note">Данные из кэша могут быть устаревшими. Обновление произойдёт автоматически при восстановлении соединения.</p>
    <p style="margin-top:24px;font-size:12px;color:var(--text3);">ASSETO v10</p>
  </div>
  <script>
    function tryReconnect() {
      window.location.reload();
    }
    // Auto-retry when online
    window.addEventListener('online', () => {
      window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
