<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Карточка — {{ user.name }}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#f2f2f7;--surface:#fff;--text:#1c1c1e;--text2:#6e6e73;--accent:#007AFF;
      --border:rgba(0,0,0,.1);--r:20px;--qr-size:160px;
    }
    [data-theme=dark]{
      --bg:#000;--surface:#1c1c1e;--text:#fff;--text2:#aeaeb2;--border:rgba(255,255,255,.12);
    }
    body{font-family:-apple-system,'Inter',sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;}

    .ctrl-panel{
      background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
      padding:20px 24px;width:100%;max-width:560px;margin-bottom:20px;
      box-shadow:0 8px 32px rgba(0,0,0,.08);
    }
    .ctrl-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
    .ctrl-row:last-child{margin-bottom:0;}
    .ctrl-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
                color:var(--text2);min-width:72px;}
    .chips{display:flex;gap:6px;flex-wrap:wrap;}
    .chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
          border:1.5px solid var(--border);background:transparent;color:var(--text2);
          font-family:inherit;transition:all .15s;}
    .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .tog-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;}
    .tog{width:44px;height:26px;border-radius:13px;background:#ccc;position:relative;
         border:none;cursor:pointer;transition:background .2s;flex-shrink:0;}
    .tog.on{background:var(--accent);}
    .tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
                border-radius:50%;background:#fff;transition:transform .2s;
                box-shadow:0 2px 4px rgba(0,0,0,.2);}
    .tog.on::after{transform:translateX(18px);}
    .btn{padding:10px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;
         cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
    .btn-pr{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(0,122,255,.3);}
    .btn-pr:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,122,255,.45);}
    .btn-sec{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);}

    .print-area{
      background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
      padding:28px;width:100%;max-width:560px;box-shadow:0 8px 32px rgba(0,0,0,.08);
    }
    .cards-wrap{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;}
    .qr-card{
      background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
      padding:20px 18px;text-align:center;display:flex;flex-direction:column;
      align-items:center;gap:10px;
    }
    .qr-card img{
      width:var(--qr-size);height:var(--qr-size);display:block;
      image-rendering:pixelated;border-radius:10px;
      border:1px solid var(--border);padding:6px;
    }
    .qr-name{font-size:15px;font-weight:800;color:var(--text);}
    .qr-role{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;}
    .qr-dept{font-size:11px;color:var(--text2);}
    .qr-id{font-size:9px;font-family:monospace;color:var(--text2);opacity:.6;}

    @media print{
      body{background:#fff!important;padding:0;}
      .ctrl-panel,.no-print{display:none!important;}
      .print-area{box-shadow:none!important;border:none!important;padding:0!important;max-width:none!important;}
      .cards-wrap{gap:6mm;}
      .qr-card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
      .qr-card img{border-color:#ccc!important;}
      .qr-name,.qr-dept,.qr-id{color:#000!important;}
      .qr-role{color:#007AFF!important;}
      @page{margin:10mm;}
    }
  </style>
</head>
<body>

<div class="ctrl-panel no-print">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
    <div>
      <div style="font-size:17px;font-weight:800;">Печать QR-карточки</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px;">{{ user.name }}</div>
    </div>
    <button class="btn btn-sec" onclick="history.back()">← Назад</button>
  </div>

  <!-- QR SIZE -->
  <div class="ctrl-row">
    <span class="ctrl-label">Размер</span>
    <div class="chips" id="sz-chips">
      <button class="chip" onclick="setSize(80,'S')">S — 80px</button>
      <button class="chip on" onclick="setSize(160,'M')">M — 160px</button>
      <button class="chip" onclick="setSize(220,'L')">L — 220px</button>
      <button class="chip" onclick="setSize(300,'XL')">XL — 300px</button>
    </div>
  </div>

  <!-- COPIES -->
  <div class="ctrl-row">
    <span class="ctrl-label">Копий</span>
    <div class="chips" id="cp-chips">
      <button class="chip on" onclick="setCopies(1)">1×</button>
      <button class="chip" onclick="setCopies(2)">2×</button>
      <button class="chip" onclick="setCopies(4)">4×</button>
      <button class="chip" onclick="setCopies(8)">8×</button>
    </div>
  </div>

  <!-- TOGGLES -->
  <div class="ctrl-row">
    <span class="ctrl-label">Показать</span>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <label class="tog-wrap"><button class="tog on" id="tg-name"></button><span style="font-size:13px;">Имя</span></label>
      <label class="tog-wrap"><button class="tog on" id="tg-role"></button><span style="font-size:13px;">Роль</span></label>
      <label class="tog-wrap"><button class="tog on" id="tg-dept"></button><span style="font-size:13px;">Отдел</span></label>
      <label class="tog-wrap"><button class="tog" id="tg-id"></button><span style="font-size:13px;">ID</span></label>
    </div>
  </div>

  <!-- THEME -->
  <div class="ctrl-row">
    <span class="ctrl-label">Тема</span>
    <div class="chips">
      <button class="chip on" id="th-light" onclick="setTheme('light')">Светлая</button>
      <button class="chip" id="th-dark" onclick="setTheme('dark')">Тёмная</button>
    </div>
  </div>

  <!-- PRINT BUTTON -->
  <div style="display:flex;gap:10px;margin-top:8px;">
    <button class="btn btn-pr" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Распечатать
    </button>
  </div>
</div>

<div class="print-area">
  <div class="cards-wrap" id="cards-wrap"></div>
</div>

<script>
  const U = {
    id: {{ user.id }},
    name: {{ user.name | tojson }},
    role: {{ user.role | tojson }},
    dept: {{ (user.department or '') | tojson }},
    qr: "/api/user/{{ user.id }}/qr"
  };
  const RL = {
    superadmin:'Супер-Админ',director:'Директор',aho:'АХО / IT',
    hr:'HR',auditor:'Аудитор',accountant:'Бухгалтер',
    deputy:'Зам. Дир.',employee:'Сотрудник',viewer:'Наблюдатель'
  };
  let copies=1, showName=true, showRole=true, showDept=true, showId=false;

  function render(){
    const wrap = document.getElementById('cards-wrap');
    let h='';
    for(let i=0;i<copies;i++){
      h+=`<div class="qr-card">
        <img src="${U.qr}?v=${i}" alt="QR">
        ${showName||showRole||showDept||showId?`<div>
          ${showName?`<div class="qr-name">${U.name}</div>`:''}
          ${showRole?`<div class="qr-role">${RL[U.role]||U.role}</div>`:''}
          ${showDept&&U.dept?`<div class="qr-dept">${U.dept}</div>`:''}
          ${showId?`<div class="qr-id">ID: ${U.id}</div>`:''}
        </div>`:''}
      </div>`;
    }
    wrap.innerHTML=h;
  }

  function setSize(px,label){
    document.documentElement.style.setProperty('--qr-size',px+'px');
    document.querySelectorAll('#sz-chips .chip').forEach(c=>{
      c.classList.toggle('on', c.textContent.includes(label));
    });
    render();
  }

  function setCopies(n){
    copies=n;
    document.querySelectorAll('#cp-chips .chip').forEach(c=>{
      c.classList.toggle('on', c.textContent.trim()===n+'×');
    });
    render();
  }

  // Toggle buttons
  ['name','role','dept','id'].forEach(k=>{
    document.getElementById('tg-'+k).addEventListener('click',function(){
      this.classList.toggle('on');
      const on=this.classList.contains('on');
      if(k==='name') showName=on;
      else if(k==='role') showRole=on;
      else if(k==='dept') showDept=on;
      else if(k==='id') showId=on;
      render();
    });
  });

  function setTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    document.getElementById('th-light').classList.toggle('on',t==='light');
    document.getElementById('th-dark').classList.toggle('on',t==='dark');
  }

  render();
</script>
</body>
</html>
